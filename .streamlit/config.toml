[browser]
gatherUsageStats = false
# Remove 'serverAddress' and 'serverPort' lines

[theme]
base = "light"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f8f8f8"
textColor = "#1a1a1a"
font = "sans serif"